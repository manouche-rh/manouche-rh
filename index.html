<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Man'ouché RH">
<meta name="theme-color" content="#0a0a0a">
<title>Man'ouché — RH</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
/* ═══════════════════════════════════════════════════════════════
   DESIGN SYSTEM — Man'ouché RH
   Refined minimalism · achromatic · editorial typography
═══════════════════════════════════════════════════════════════ */
:root {
  --c-ink: #0a0a0a;
  --c-ink-2: #171717;
  --c-ink-3: #404040;
  --c-ink-4: #737373;
  --c-ink-5: #a3a3a3;
  --c-line: #e5e5e5;
  --c-line-2: #f0f0f0;
  --c-bg: #fafafa;
  --c-surface: #ffffff;
  --c-paper: #f5f5f5;
  --c-alert: #b91c1c;
  --c-alert-bg: #fef2f2;
  --c-good: #166534;
  --c-good-bg: #f0fdf4;
  --c-warn: #92400e;
  --c-warn-bg: #fffbeb;

  --f-display: 'DM Sans', system-ui, sans-serif;
  --f-body: 'DM Sans', system-ui, sans-serif;
  --f-mono: 'DM Mono', ui-monospace, monospace;

  --r-xs: 4px;
  --r-sm: 6px;
  --r: 10px;
  --r-lg: 16px;

  --shadow-sm: 0 1px 2px rgba(0,0,0,.04);
  --shadow: 0 4px 24px -8px rgba(0,0,0,.08);
  --shadow-lg: 0 24px 60px -20px rgba(0,0,0,.15);

  --safe-top: env(safe-area-inset-top);
  --safe-bot: env(safe-area-inset-bottom);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  height: 100%;
  background: var(--c-bg);
  color: var(--c-ink);
  font-family: var(--f-body);
  font-size: 14px;
  line-height: 1.5;
  font-feature-settings: 'ss01', 'cv11';
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
  overscroll-behavior-y: none;
}

input, button, select, textarea { font: inherit; color: inherit; }
button { background: none; border: none; cursor: pointer; }
a { color: inherit; text-decoration: none; }

/* Typography */
.serif { font-family: var(--f-display); letter-spacing: -0.01em; }
.mono { font-family: var(--f-mono); font-feature-settings: 'tnum'; }
.tabular { font-variant-numeric: tabular-nums; }
.uppercase-eyebrow {
  font-size: 10.5px;
  font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--c-ink-4);
}
.h-display { font-family: var(--f-display); font-size: 44px; line-height: 1; font-weight: 400; letter-spacing: -0.02em; }
.h-1 { font-size: 22px; font-weight: 500; letter-spacing: -0.02em; line-height: 1.2; }
.h-2 { font-size: 16px; font-weight: 500; letter-spacing: -0.01em; }
.h-3 { font-size: 13px; font-weight: 500; letter-spacing: -0.005em; }
.text-mute { color: var(--c-ink-4); }
.text-dim { color: var(--c-ink-5); }

/* ─────────────── LAYOUT ─────────────── */
#app { min-height: 100dvh; display: flex; flex-direction: column; }

/* ─────────────── LOGIN ─────────────── */
.login-screen {
  min-height: 100dvh;
  display: grid;
  place-items: center;
  background: var(--c-surface);
  position: relative;
  padding: 24px;
  padding-top: calc(24px + var(--safe-top));
}
.login-screen::before {
  content: '';
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 600px 400px at 20% 30%, rgba(0,0,0,.025), transparent 60%),
    radial-gradient(ellipse 800px 600px at 80% 70%, rgba(0,0,0,.02), transparent 60%);
  pointer-events: none;
}
.login-card {
  position: relative;
  width: 100%;
  max-width: 380px;
  padding: 32px 28px 28px;
  background: var(--c-surface);
  border: 1px solid var(--c-line);
  border-radius: var(--r-lg);
  box-shadow: var(--shadow-lg);
  animation: fadeUp .5s cubic-bezier(.2,.7,.2,1);
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}
.login-mark {
  width: 44px; height: 44px;
  background: var(--c-ink);
  color: var(--c-surface);
  display: grid; place-items: center;
  border-radius: var(--r);
  font-family: var(--f-display);
  font-size: 22px;
  margin-bottom: 20px;
}
.login-h { font-family: var(--f-display); font-size: 32px; letter-spacing: -0.02em; line-height: 1; margin-bottom: 4px; }
.login-h em {  color: var(--c-ink-4); }
.login-sub { font-size: 13px; color: var(--c-ink-4); margin-bottom: 28px; }

.tab-switch {
  display: grid; grid-template-columns: 1fr 1fr;
  background: var(--c-paper);
  padding: 3px;
  border-radius: var(--r-sm);
  margin-bottom: 20px;
  position: relative;
}
.tab-switch button {
  padding: 8px 12px;
  font-size: 13px;
  font-weight: 500;
  color: var(--c-ink-4);
  border-radius: 4px;
  position: relative;
  z-index: 2;
  transition: color .2s;
}
.tab-switch button.active { color: var(--c-ink); }
.tab-switch::before {
  content: '';
  position: absolute;
  top: 3px; left: 3px;
  width: calc(50% - 3px); height: calc(100% - 6px);
  background: var(--c-surface);
  border-radius: 4px;
  box-shadow: var(--shadow-sm);
  transition: transform .25s cubic-bezier(.4,0,.2,1);
}
.tab-switch[data-active="1"]::before { transform: translateX(calc(100% + 0px)); }

.field { margin-bottom: 14px; }
.field-label {
  display: block;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  color: var(--c-ink-4);
  margin-bottom: 6px;
}
.input {
  width: 100%;
  padding: 11px 12px;
  background: var(--c-surface);
  border: 1px solid var(--c-line);
  border-radius: var(--r-sm);
  font-size: 14px;
  transition: border .15s, box-shadow .15s;
}
.input:focus {
  outline: none;
  border-color: var(--c-ink);
  box-shadow: 0 0 0 3px rgba(0,0,0,.04);
}
.input.mono { font-family: var(--f-mono); letter-spacing: 0.04em; }

.btn-pri {
  width: 100%;
  padding: 12px 16px;
  background: var(--c-ink);
  color: var(--c-surface);
  border-radius: var(--r-sm);
  font-size: 14px;
  font-weight: 500;
  transition: transform .12s, opacity .15s;
}
.btn-pri:hover { transform: translateY(-1px); }
.btn-pri:active { transform: translateY(0); }
.btn-pri:disabled { opacity: .4; cursor: not-allowed; transform: none; }

.btn-sec {
  padding: 9px 14px;
  background: var(--c-surface);
  color: var(--c-ink);
  border: 1px solid var(--c-line);
  border-radius: var(--r-sm);
  font-size: 13px;
  font-weight: 500;
  transition: background .15s, border-color .15s;
}
.btn-sec:hover { background: var(--c-paper); border-color: var(--c-ink-5); }

.btn-ghost {
  padding: 7px 10px;
  font-size: 12.5px;
  color: var(--c-ink-4);
  border-radius: var(--r-sm);
  font-weight: 500;
  transition: background .15s, color .15s;
}
.btn-ghost:hover { background: var(--c-paper); color: var(--c-ink); }

.btn-danger {
  padding: 9px 14px;
  background: var(--c-surface);
  color: var(--c-alert);
  border: 1px solid var(--c-line);
  border-radius: var(--r-sm);
  font-size: 13px;
  font-weight: 500;
}
.btn-danger:hover { background: var(--c-alert-bg); border-color: var(--c-alert); }

.btn-icon {
  width: 32px; height: 32px;
  display: grid; place-items: center;
  border-radius: var(--r-sm);
  color: var(--c-ink-4);
}
.btn-icon:hover { background: var(--c-paper); color: var(--c-ink); }

.login-status {
  display: flex; align-items: center; gap: 6px;
  margin-top: 20px; padding-top: 16px;
  border-top: 1px solid var(--c-line);
  font-size: 11.5px;
  color: var(--c-ink-4);
}
.dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--c-ink-5);
}
.dot.on { background: #16a34a; box-shadow: 0 0 0 3px rgba(22,163,74,.15); }
.dot.off { background: var(--c-ink-5); }

/* ─────────────── APP SHELL — ADMIN (desktop sidebar) ─────────────── */
.shell { display: grid; grid-template-columns: 240px 1fr; min-height: 100dvh; }
@media (max-width: 900px) { .shell { grid-template-columns: 1fr; } }

.side {
  background: var(--c-ink);
  color: var(--c-surface);
  padding: 22px 18px 18px;
  display: flex; flex-direction: column;
  position: sticky; top: 0;
  height: 100dvh;
  padding-top: calc(22px + var(--safe-top));
}
@media (max-width: 900px) { .side { display: none; } }

.side-brand {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 28px;
  padding-bottom: 18px;
  border-bottom: 1px solid rgba(255,255,255,.08);
}
.side-mark {
  width: 32px; height: 32px;
  background: var(--c-surface);
  color: var(--c-ink);
  display: grid; place-items: center;
  border-radius: var(--r-sm);
  font-family: var(--f-display);
  font-size: 17px;
}
.side-brand-name {
  font-family: var(--f-display);
  font-size: 18px;
  letter-spacing: -0.01em;
  line-height: 1;
}
.side-brand-name em {  color: var(--c-ink-5); }
.side-brand-sub { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(255,255,255,.4); margin-top: 3px; }

.side-section {
  font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase;
  color: rgba(255,255,255,.35);
  margin: 18px 0 8px;
  padding: 0 4px;
}
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 12px;
  margin: 1px 0;
  border-radius: var(--r-sm);
  color: rgba(255,255,255,.65);
  font-size: 13.5px;
  font-weight: 500;
  cursor: pointer;
  transition: background .15s, color .15s;
  position: relative;
  width: 100%;
  text-align: left;
}
.nav-item:hover { background: rgba(255,255,255,.06); color: var(--c-surface); }
.nav-item.active { background: rgba(255,255,255,.1); color: var(--c-surface); }
.nav-item .ico { width: 16px; height: 16px; opacity: .8; flex-shrink: 0; }
.nav-item .badge {
  margin-left: auto;
  background: var(--c-alert);
  color: var(--c-surface);
  font-size: 10px;
  font-weight: 600;
  padding: 1px 6px;
  border-radius: 20px;
  font-family: var(--f-mono);
}

.side-foot {
  margin-top: auto;
  padding-top: 16px;
  border-top: 1px solid rgba(255,255,255,.08);
  display: flex; align-items: center; gap: 10px;
  font-size: 12px;
  color: rgba(255,255,255,.6);
}
.side-foot .av {
  width: 28px; height: 28px;
  background: rgba(255,255,255,.1);
  border-radius: var(--r-sm);
  display: grid; place-items: center;
  font-size: 11px;
  color: var(--c-surface);
}

/* Main */
.main {
  background: var(--c-bg);
  display: flex; flex-direction: column;
  min-width: 0;
}
.page-pad {
  padding: 28px 32px;
  max-width: 1280px;
  width: 100%;
}
@media (max-width: 700px) { .page-pad { padding: 16px; } }

.page-head {
  display: flex; justify-content: space-between; align-items: flex-end;
  margin-bottom: 24px;
  gap: 16px; flex-wrap: wrap;
}
.page-head .eyebrow { margin-bottom: 6px; }
.page-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

/* ─────────────── PANELS / SECTIONS ─────────────── */
.panel {
  background: var(--c-surface);
  border: 1px solid var(--c-line);
  border-radius: var(--r);
  overflow: hidden;
}
.panel + .panel { margin-top: 16px; }
.panel-head {
  padding: 14px 18px;
  border-bottom: 1px solid var(--c-line);
  display: flex; align-items: center; justify-content: space-between;
  gap: 12px;
}
.panel-head h3 { font-size: 13px; font-weight: 500; letter-spacing: -0.005em; }
.panel-body { padding: 18px; }
.panel-body.nopad { padding: 0; }

/* KPI */
.kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 20px; }
@media (max-width: 900px) { .kpi-grid { grid-template-columns: repeat(2, 1fr); } }

.kpi {
  background: var(--c-surface);
  border: 1px solid var(--c-line);
  border-radius: var(--r);
  padding: 16px 18px;
  transition: border-color .15s, transform .15s;
}
.kpi:hover { border-color: var(--c-ink-5); }
.kpi-label { font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--c-ink-4); margin-bottom: 8px; }
.kpi-value {
  font-family: var(--f-display);
  font-size: 36px;
  line-height: 1;
  letter-spacing: -0.02em;
  font-weight: 400;
  margin-bottom: 6px;
  font-variant-numeric: tabular-nums;
}
.kpi-meta { font-size: 11.5px; color: var(--c-ink-4); display: flex; align-items: center; gap: 6px; }
.kpi.alert .kpi-value { color: var(--c-alert); }

/* Tables */
.tbl { width: 100%; border-collapse: collapse; }
.tbl th {
  text-align: left;
  font-size: 10.5px;
  font-weight: 500;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--c-ink-4);
  padding: 12px 18px;
  border-bottom: 1px solid var(--c-line);
  background: var(--c-paper);
  white-space: nowrap;
}
.tbl td {
  padding: 14px 18px;
  border-bottom: 1px solid var(--c-line-2);
  font-size: 13.5px;
}
.tbl tr:last-child td { border-bottom: none; }
.tbl tr:hover td { background: var(--c-paper); }

/* Avatar */
.av-emp {
  width: 32px; height: 32px;
  display: inline-grid; place-items: center;
  background: var(--c-ink);
  color: var(--c-surface);
  border-radius: 50%;
  font-size: 11px; font-weight: 600;
  letter-spacing: 0.04em;
  font-family: var(--f-mono);
  vertical-align: middle;
}
.av-emp.lg { width: 44px; height: 44px; font-size: 14px; }
.av-emp.sm { width: 24px; height: 24px; font-size: 9.5px; }

.emp-cell { display: flex; align-items: center; gap: 12px; }
.emp-cell-name { font-weight: 500; font-size: 13.5px; }
.emp-cell-meta { font-size: 11.5px; color: var(--c-ink-4); }

/* Status */
.status-dot {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 12px;
  color: var(--c-ink-3);
}
.status-dot::before {
  content: '';
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--c-ink-5);
}
.status-dot.on::before { background: #16a34a; }
.status-dot.off::before { background: var(--c-ink-5); }
.status-dot.alert::before { background: var(--c-alert); }
.status-dot.warn::before { background: #d97706; }

.chip {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 3px 9px;
  border-radius: 100px;
  font-size: 11.5px;
  font-weight: 500;
  background: var(--c-paper);
  color: var(--c-ink-3);
  border: 1px solid var(--c-line);
}
.chip.alert { background: var(--c-alert-bg); color: var(--c-alert); border-color: rgba(185,28,28,.15); }
.chip.good { background: var(--c-good-bg); color: var(--c-good); border-color: rgba(22,101,52,.15); }
.chip.warn { background: var(--c-warn-bg); color: var(--c-warn); border-color: rgba(146,64,14,.15); }

/* Planning grid */
.plan-wrap { overflow-x: auto; }
.plan {
  min-width: 920px;
  display: grid;
  grid-template-columns: 180px repeat(7, 1fr);
  background: var(--c-surface);
}
.plan-cell {
  border-right: 1px solid var(--c-line-2);
  border-bottom: 1px solid var(--c-line-2);
  padding: 8px;
  min-height: 88px;
  position: relative;
  transition: background .15s;
}
.plan-cell:last-child { border-right: none; }
.plan-cell.head { background: var(--c-paper); border-bottom: 1px solid var(--c-line); padding: 10px 12px; min-height: 0; }
.plan-cell.head .day { font-size: 10.5px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--c-ink-4); }
.plan-cell.head .date {
  font-family: var(--f-display);
  font-size: 22px;
  line-height: 1;
  letter-spacing: -0.02em;
  margin-top: 2px;
}
.plan-cell.head .date.today { color: var(--c-alert);  }
.plan-cell.emp { background: var(--c-paper); padding: 12px; border-bottom: 1px solid var(--c-line-2); }
.plan-cell.emp .nm { font-size: 13px; font-weight: 500; }
.plan-cell.emp .ct { font-size: 11px; color: var(--c-ink-4); margin-top: 2px; font-family: var(--f-mono); }

.plan-cell.cell:hover { background: var(--c-paper); cursor: pointer; }
.plan-cell.cell.has::after {
  content: '';
  position: absolute; inset: 4px;
  border-radius: var(--r-xs);
  pointer-events: none;
}

.shift {
  display: block;
  padding: 6px 8px;
  margin-bottom: 4px;
  border-radius: var(--r-xs);
  font-size: 11.5px;
  cursor: pointer;
  position: relative;
  z-index: 1;
  border: 1px solid transparent;
}
.shift .t {
  font-family: var(--f-mono);
  font-size: 10.5px;
  letter-spacing: 0.02em;
  display: block;
  opacity: 0.85;
}
.shift .l {
  font-weight: 600;
  margin-top: 1px;
  display: block;
  font-size: 11px;
}
.shift .dur {
  font-family: var(--f-mono);
  font-size: 10px;
  opacity: 0.7;
  display: block;
  margin-top: 2px;
}
.shift .pause {
  font-family: var(--f-mono);
  font-size: 9.5px;
  opacity: 0.7;
  display: block;
  margin-top: 3px;
  padding-top: 3px;
  border-top: 1px dashed currentColor;
  border-top-color: rgba(0,0,0,.12);
}
.shift.midi { background: #dbeafe; color: #1e3a8a; border-color: #93c5fd; }
.shift.soir { background: #dcfce7; color: #14532d; border-color: #86efac; }
.shift.ar { background: #fef9c3; color: #713f12; border-color: #fde047; }
.shift.absent { background: #fee2e2; color: #b91c1c; border-color: #fca5a5; text-align: center; padding: 12px 8px; font-weight: 600; }
.shift.conge { background: #d1fae5; color: #166534; border-color: #6ee7b7; text-align: center; padding: 12px 8px; font-weight: 600; }

/* Leave types — categorized absences */
.shift.leave-cp           { background: #dbeafe; color: #1e3a8a; border-color: #93c5fd; text-align: center; padding: 12px 8px; font-weight: 600; }
.shift.leave-justifie     { background: #fef3c7; color: #92400e; border-color: #fcd34d; text-align: center; padding: 12px 8px; font-weight: 600; }
.shift.leave-injustifie   { background: #fee2e2; color: #991b1b; border-color: #fca5a5; text-align: center; padding: 12px 8px; font-weight: 600; }
.shift.leave-am           { background: #ede9fe; color: #5b21b6; border-color: #c4b5fd; text-align: center; padding: 12px 8px; font-weight: 600; }
.shift.leave-rtt          { background: #cffafe; color: #155e75; border-color: #67e8f9; text-align: center; padding: 12px 8px; font-weight: 600; }
.shift.leave-recup        { background: #f3e8ff; color: #6b21a8; border-color: #d8b4fe; text-align: center; padding: 12px 8px; font-weight: 600; }

/* Hours table coloring */
.tbl td.over  { color: var(--c-warn); }
.tbl td.under { color: var(--c-alert); }

/* Month view */
.month-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 1px;
  background: var(--c-line);
}
.mc {
  background: var(--c-surface);
  min-height: 88px;
  padding: 6px 8px;
  font-size: 11.5px;
  cursor: pointer;
  transition: background .15s;
  position: relative;
}
.mc:hover { background: var(--c-paper); }
.mc.head { background: var(--c-paper); min-height: 0; padding: 8px; cursor: default; }
.mc.head .day {
  font-size: 10.5px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--c-ink-4);
  text-align: center;
}
.mc.out { background: #fafafa; opacity: 0.55; }
.mc.today { background: #fffbeb; }
.mc-date {
  font-family: var(--f-display);
  font-size: 16px;
  letter-spacing: -0.02em;
  line-height: 1;
  margin-bottom: 6px;
}
.mc-date.today { color: var(--c-alert);  }
.mc-stat { font-size: 11px; color: var(--c-ink-3); line-height: 1.4; }
.mc-stat strong { font-family: var(--f-mono); font-weight: 500; }
.mc-leaves { display: flex; gap: 2px; margin-top: 4px; flex-wrap: wrap; }
.mc-leave {
  width: 18px; height: 18px;
  border-radius: 50%;
  display: grid; place-items: center;
  font-size: 9.5px;
  font-weight: 600;
  font-family: var(--f-mono);
}
.mc-leave.leave-cp         { background: #dbeafe; color: #1e3a8a; }
.mc-leave.leave-justifie   { background: #fef3c7; color: #92400e; }
.mc-leave.leave-injustifie { background: #fee2e2; color: #991b1b; }
.mc-leave.leave-am         { background: #ede9fe; color: #5b21b6; }
.mc-leave.leave-rtt        { background: #cffafe; color: #155e75; }
.mc-leave.leave-recup      { background: #f3e8ff; color: #6b21a8; }

.dot-color {
  display: inline-block;
  width: 10px; height: 10px;
  border-radius: 50%;
  margin-right: 4px;
  vertical-align: middle;
}

/* Publication banner (employee) */
.pub-banner {
  background: linear-gradient(135deg, #1e3a8a 0%, #312e81 100%);
  color: #fff;
  padding: 14px 16px;
  border-radius: var(--r);
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 12px;
  animation: pubIn .35s cubic-bezier(.2,.7,.2,1);
  box-shadow: 0 8px 24px -8px rgba(30,58,138,.4);
}
@keyframes pubIn {
  from { opacity: 0; transform: translateY(-8px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Jours fériés */
.ferie-banner {
  background: linear-gradient(135deg, #fef2f2 0%, #fef7f7 100%);
  border: 1px solid #fecaca;
  border-left: 3px solid #dc2626;
  border-radius: var(--r);
  padding: 12px 16px;
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 12px;
  color: #7f1d1d;
}
.ferie-banner .ferie-icon { font-size: 20px; line-height: 1; }
.ferie-banner strong { font-weight: 600; font-size: 13px; }
.plan-cell.head.ferie {
  background: #fef2f2;
  border-top: 2px solid #dc2626;
}
.ferie-tag {
  font-size: 9.5px;
  color: #b91c1c;
  font-weight: 500;
  margin-top: 3px;
  letter-spacing: -0.01em;
  line-height: 1.1;
}
.plan-cell.cell.ferie-cell {
  background: linear-gradient(180deg, rgba(220,38,38,.04) 0%, transparent 30%);
}
.mc.ferie { background: #fef7f7; }
.mc.ferie.out { background: #fef2f2; opacity: 0.45; }
.mc-ferie {
  font-size: 9.5px;
  color: #b91c1c;
  font-weight: 600;
  margin-bottom: 4px;
  letter-spacing: -0.01em;
  line-height: 1.15;
  background: #fee2e2;
  padding: 2px 5px;
  border-radius: 3px;
  display: inline-block;
}
.day-card.ferie { border-left: 3px solid #dc2626; }
.ferie-pill {
  display: inline-block;
  margin-top: 4px;
  font-size: 10.5px;
  color: #b91c1c;
  background: #fee2e2;
  padding: 2px 7px;
  border-radius: 10px;
  font-weight: 500;
  letter-spacing: -0.01em;
}

/* ─── Fiche salarié — header & tabs ─── */
.emp-header {
  background: linear-gradient(135deg, #1f3a3a 0%, #14532d 100%);
  color: #fff;
  border-radius: var(--r);
  padding: 22px 24px;
  margin-bottom: 16px;
}
.emp-header-top { display: flex; gap: 16px; align-items: center; margin-bottom: 20px; }
.av-emp.lg { width: 56px; height: 56px; font-size: 22px; background: rgba(255,255,255,.18); color: #fff; }
.emp-header-name {
  font-family: var(--f-display);
  font-size: 26px; line-height: 1; letter-spacing: -0.02em; font-weight: 600;
  margin-bottom: 4px;
}
.emp-header-sub { font-size: 13px; opacity: .85; }
.emp-header-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
  gap: 14px;
  padding-top: 14px;
  border-top: 1px solid rgba(255,255,255,.15);
}
.ehg-label {
  font-size: 9.5px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  opacity: .7;
  margin-bottom: 4px;
}
.ehg-value { font-size: 14px; font-weight: 500; }

.emp-tabs {
  display: flex;
  gap: 4px;
  border-bottom: 1px solid var(--c-line);
  margin-bottom: 18px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.emp-tabs::-webkit-scrollbar { display: none; }
.emp-tab {
  background: none;
  border: none;
  padding: 11px 16px;
  font-family: inherit;
  font-size: 13px;
  color: var(--c-ink-4);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  white-space: nowrap;
  font-weight: 500;
  transition: color .15s, border-color .15s;
}
.emp-tab:hover { color: var(--c-ink); }
.emp-tab.active {
  color: var(--c-ink);
  border-bottom-color: var(--c-ink);
}
.emp-tabbody { animation: fadeIn .25s ease; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

/* ─── kv rows (info display) ─── */
.info-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
  gap: 14px;
}
.kv-row {
  display: grid;
  grid-template-columns: 180px 1fr;
  gap: 14px;
  padding: 10px 0;
  border-bottom: 1px solid var(--c-line-2);
  font-size: 13px;
}
.kv-row:last-child { border-bottom: none; }
.kv-label { color: var(--c-ink-4); font-weight: 500; }
.kv-value { color: var(--c-ink); }

/* ─── CP summary cards ─── */
.cp-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 12px;
}
.cp-card {
  background: var(--c-surface);
  border: 1px solid var(--c-line);
  border-radius: var(--r);
  padding: 16px 18px;
}
.cp-card-label {
  font-size: 10.5px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--c-ink-4);
  margin-bottom: 6px;
  font-weight: 500;
}
.cp-card-value {
  font-family: var(--f-display);
  font-size: 28px;
  letter-spacing: -0.02em;
  font-weight: 600;
  line-height: 1;
}
.cp-card-sub {
  margin-top: 6px;
  font-size: 11px;
  color: var(--c-ink-4);
}

/* ─── Modal section titles ─── */
.modal-section-title {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  font-weight: 600;
  color: var(--c-ink-4);
  margin-top: 18px;
  margin-bottom: 10px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--c-line-2);
}
.modal-section-title:first-child { margin-top: 0; }

/* ─── Chip variants ─── */
.chip.good {
  background: #d1fae5;
  color: #065f46;
  border-color: #6ee7b7;
}
.chip.warn {
  background: #fef3c7;
  color: #92400e;
  border-color: #fcd34d;
}
.chip.alert {
  background: #fee2e2;
  color: #991b1b;
  border-color: #fca5a5;
}

/* ─── Panel head with right button ─── */
.panel-head { display: flex; align-items: center; justify-content: space-between; }
.panel-head .btn-sec { padding: 6px 12px; font-size: 12px; }

@media (max-width: 700px) {
  .emp-header { padding: 16px 18px; }
  .emp-header-name { font-size: 22px; }
  .av-emp.lg { width: 48px; height: 48px; font-size: 18px; }
  .kv-row { grid-template-columns: 130px 1fr; gap: 10px; font-size: 12.5px; }
  .info-grid { grid-template-columns: 1fr; }
}

/* Brouillon badge */
.chip.draft {
  background: #fff7ed;
  color: #9a3412;
  border: 1px solid #fdba74;
  font-weight: 600;
  letter-spacing: 0.02em;
  animation: draftPulse 2s ease-in-out infinite;
}
@keyframes draftPulse {
  0%, 100% { background: #fff7ed; }
  50%      { background: #ffedd5; }
}

.plan-actions {
  gap: 8px;
  margin-bottom: 14px;
  flex-wrap: wrap;
}

/* ─── Impression / Export PDF ─── */
@media print {
  @page { size: A4 landscape; margin: 12mm 10mm; }
  body { background: white !important; color: black !important; }
  body * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .side, .mob-head, .toast-host, .modal-back,
  .page-actions, .plan-actions, .ferie-banner,
  .pub-banner, [data-page], .row[style*="margin-top:12px"] { display: none !important; }
  .main { padding: 0 !important; max-width: 100% !important; margin: 0 !important; }
  .page-head { margin-bottom: 6mm; }
  .page-head .h-1 { font-size: 20px !important; }
  .panel { box-shadow: none !important; border: 1px solid #ddd !important; }
  .panel-body.nopad { padding: 0 !important; }
  .plan-wrap { overflow: visible !important; }
  .plan {
    grid-template-columns: 110px repeat(7, 1fr) !important;
    page-break-inside: avoid;
  }
  .plan-cell {
    font-size: 9px !important;
    padding: 4px 5px !important;
    min-height: 48px !important;
  }
  .plan-cell.head { padding: 5px !important; }
  .plan-cell.head .date { font-size: 14px !important; }
  .plan-cell.head .day { font-size: 8.5px !important; }
  .plan-cell.emp .nm { font-size: 11px !important; }
  .plan-cell.emp .ct { font-size: 9px !important; }
  .ferie-tag { font-size: 7.5px !important; }
  .shift {
    padding: 3px 5px !important;
    font-size: 8.5px !important;
    margin-bottom: 2px !important;
    border-width: 1px !important;
  }
  .shift .l { font-size: 8.5px !important; }
  .shift .t { font-size: 8px !important; }
  .shift .dur, .shift .pause { font-size: 7.5px !important; }
  .av-emp { width: 24px !important; height: 24px !important; font-size: 9px !important; }
}
.printing .side, .printing .mob-head { display: none !important; }
.printing .main { padding: 0 !important; max-width: 100% !important; }

/* ─────────────── EMPLOYEE MOBILE ─────────────── */
.emp-shell {
  display: flex; flex-direction: column;
  min-height: 100dvh;
  background: var(--c-bg);
  padding-top: var(--safe-top);
  padding-bottom: calc(72px + var(--safe-bot));
}
.emp-topbar {
  padding: 14px 16px;
  background: var(--c-surface);
  border-bottom: 1px solid var(--c-line);
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0;
  z-index: 100;
}
.emp-topbar .greet .gtitle { font-family: var(--f-display); font-size: 22px; letter-spacing: -0.02em; line-height: 1; }
.emp-topbar .greet .gsub { font-size: 11.5px; color: var(--c-ink-4); margin-top: 2px; }

.emp-content { padding: 16px; flex: 1; }

.emp-tabbar {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--c-surface);
  border-top: 1px solid var(--c-line);
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  padding: 8px 0 calc(8px + var(--safe-bot));
  z-index: 100;
}
.emp-tab {
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  padding: 6px 4px;
  color: var(--c-ink-5);
  font-size: 10.5px;
  font-weight: 500;
  letter-spacing: 0.02em;
  transition: color .15s;
}
.emp-tab.active { color: var(--c-ink); }
.emp-tab svg { width: 22px; height: 22px; }

/* Big pointage button */
.punch-card {
  background: var(--c-ink);
  color: var(--c-surface);
  border-radius: var(--r-lg);
  padding: 24px 20px;
  margin-bottom: 16px;
  position: relative;
  overflow: hidden;
}
.punch-card::before {
  content: '';
  position: absolute;
  top: -50%; right: -20%;
  width: 200px; height: 200px;
  background: radial-gradient(circle, rgba(255,255,255,.08), transparent 70%);
  pointer-events: none;
}
.punch-time {
  font-family: var(--f-display);
  font-size: 56px;
  line-height: 1;
  letter-spacing: -0.03em;
  font-variant-numeric: tabular-nums;
  margin-bottom: 4px;
}
.punch-date { font-size: 12px; color: rgba(255,255,255,.55); letter-spacing: 0.04em; text-transform: uppercase; margin-bottom: 20px; }
.punch-status { font-size: 13px; color: rgba(255,255,255,.7); margin-bottom: 16px; line-height: 1.5; }
.punch-btn {
  display: block;
  width: 100%;
  padding: 14px;
  background: var(--c-surface);
  color: var(--c-ink);
  border-radius: var(--r-sm);
  font-size: 14px;
  font-weight: 500;
  text-align: center;
  position: relative;
  z-index: 2;
  transition: transform .12s;
}
.punch-btn:hover { transform: translateY(-1px); }
.punch-btn.secondary {
  background: rgba(255,255,255,.1);
  color: var(--c-surface);
  border: 1px solid rgba(255,255,255,.15);
  margin-top: 8px;
}

.day-card {
  background: var(--c-surface);
  border: 1px solid var(--c-line);
  border-radius: var(--r);
  padding: 14px 16px;
  margin-bottom: 10px;
  display: flex; align-items: center; gap: 12px;
}
.day-card .day-num {
  font-family: var(--f-display);
  font-size: 28px;
  line-height: 1;
  letter-spacing: -0.02em;
  min-width: 36px;
  font-variant-numeric: tabular-nums;
}
.day-card .day-name { font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--c-ink-4); }
.day-card.today .day-num { color: var(--c-alert);  }
.day-card.today { border-color: var(--c-ink); }
.day-card .day-info { flex: 1; }
.day-card .day-shift {
  font-family: var(--f-mono);
  font-size: 13px;
  font-weight: 500;
  margin-top: 4px;
}
.day-card .day-meta { font-size: 11.5px; color: var(--c-ink-4); margin-top: 2px; }
.day-card.off .day-shift { color: var(--c-ink-5); }

/* ─────────────── MODAL ─────────────── */
.modal-bg {
  position: fixed; inset: 0;
  background: rgba(10,10,10,.6);
  backdrop-filter: blur(4px);
  display: grid; place-items: center;
  z-index: 1000;
  animation: fadeIn .2s;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.modal {
  background: var(--c-surface);
  border-radius: var(--r-lg);
  width: 90%; max-width: 460px;
  max-height: 90vh;
  overflow: auto;
  animation: modalIn .25s cubic-bezier(.2,.7,.2,1);
}
@keyframes modalIn {
  from { opacity: 0; transform: scale(.96) translateY(8px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}
.modal-h { padding: 18px 20px; border-bottom: 1px solid var(--c-line); display: flex; justify-content: space-between; align-items: center; }
.modal-h h3 { font-family: var(--f-display); font-size: 22px; letter-spacing: -0.02em; font-weight: 400; line-height: 1; }
.modal-b { padding: 20px; }
.modal-f { padding: 14px 20px; border-top: 1px solid var(--c-line); display: flex; gap: 8px; justify-content: flex-end; }

/* Toast */
#toast-host {
  position: fixed;
  top: calc(20px + var(--safe-top));
  right: 20px;
  z-index: 2000;
  display: flex; flex-direction: column; gap: 8px;
  pointer-events: none;
}
@media (max-width: 700px) {
  #toast-host { left: 16px; right: 16px; top: calc(16px + var(--safe-top)); }
}
.toast {
  background: var(--c-ink);
  color: var(--c-surface);
  padding: 12px 16px;
  border-radius: var(--r);
  font-size: 13px;
  box-shadow: var(--shadow-lg);
  animation: toastIn .25s cubic-bezier(.2,.7,.2,1);
  pointer-events: auto;
  display: flex; align-items: center; gap: 8px;
  min-width: 220px;
}
.toast.error { background: var(--c-alert); }
.toast.good { background: #166534; }
@keyframes toastIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
@keyframes toastOut { to { opacity: 0; transform: translateX(20px); } }

/* Spinner */
.spin {
  display: inline-block;
  width: 14px; height: 14px;
  border: 2px solid currentColor;
  border-right-color: transparent;
  border-radius: 50%;
  animation: spin .7s linear infinite;
  opacity: .6;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Empty state */
.empty {
  padding: 60px 20px;
  text-align: center;
  color: var(--c-ink-4);
}
.empty h4 { font-family: var(--f-display); font-size: 22px; color: var(--c-ink); margin-bottom: 6px; font-weight: 400; }

/* Mobile admin header */
.mob-head {
  display: none;
  padding: 14px 16px;
  background: var(--c-ink);
  color: var(--c-surface);
  align-items: center;
  gap: 12px;
  position: sticky; top: 0; z-index: 100;
  padding-top: calc(14px + var(--safe-top));
}
.mob-head .side-mark { width: 28px; height: 28px; font-size: 15px; }
.mob-head .brand { font-family: var(--f-display); font-size: 18px; letter-spacing: -0.01em; line-height: 1; }
.mob-head select {
  margin-left: auto;
  background: rgba(255,255,255,.1);
  color: var(--c-surface);
  border: 1px solid rgba(255,255,255,.15);
  padding: 6px 10px;
  border-radius: var(--r-sm);
  font-size: 13px;
}
@media (max-width: 900px) { .mob-head { display: flex; } }

/* Alert row */
.alert-row {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 14px 18px;
  border-bottom: 1px solid var(--c-line-2);
}
.alert-row:last-child { border-bottom: none; }
.alert-row .alert-icon {
  width: 28px; height: 28px;
  background: var(--c-alert-bg);
  color: var(--c-alert);
  border-radius: var(--r-sm);
  display: grid; place-items: center;
  flex-shrink: 0;
  font-size: 13px;
}
.alert-row.warn .alert-icon { background: var(--c-warn-bg); color: var(--c-warn); }
.alert-row .alert-body { flex: 1; }
.alert-row .alert-title { font-size: 13.5px; font-weight: 500; margin-bottom: 2px; }
.alert-row .alert-meta { font-size: 12px; color: var(--c-ink-4); }
.alert-row .alert-actions { display: flex; gap: 6px; }

/* Stripes for week separators */
.week-nav { display: flex; align-items: center; gap: 4px; }
.week-nav .week-label { padding: 6px 12px; font-family: var(--f-mono); font-size: 12.5px; min-width: 140px; text-align: center; }

/* Forms grid */
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.form-grid .full { grid-column: 1 / -1; }
@media (max-width: 500px) { .form-grid { grid-template-columns: 1fr; } }

/* Skeleton */
.skel { height: 14px; background: linear-gradient(90deg, var(--c-line-2), var(--c-paper), var(--c-line-2)); background-size: 200% 100%; animation: skel 1.4s infinite; border-radius: 4px; }
@keyframes skel { from { background-position: 200% 0; } to { background-position: -200% 0; } }

/* Utility */
.row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.col { display: flex; flex-direction: column; gap: 8px; }
.spacer { flex: 1; }
.divider { height: 1px; background: var(--c-line); margin: 16px 0; }

.hidden { display: none !important; }
.fade-in { animation: fadeUp .35s cubic-bezier(.2,.7,.2,1); }

/* Scroll */
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-thumb { background: var(--c-line); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--c-ink-5); }
</style>
</head>

<div id="app">
  <!-- Initial loading screen -->
  <div id="boot" class="login-screen">
    <div style="text-align:center;">
      <div style="font-family:var(--f-display); font-size:48px; letter-spacing:-0.02em; margin-bottom:12px;">Man'ouché</div>
      <div class="spin" style="color:var(--c-ink);"></div>
    </div>
  </div>
</div>

<div id="toast-host"></div>

<!-- Firebase compat SDK -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script src="app.js"></script>
