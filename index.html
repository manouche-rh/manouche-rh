<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Man'ouché RH">
<meta name="theme-color" content="#0a0a0a">
<title>Man'ouché — RH</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
/* ═══════════════════════════════════════════════════════════════
   DESIGN SYSTEM — Man'ouché RH
   Refined minimalism · achromatic · editorial typography
═══════════════════════════════════════════════════════════════ */
:root {
  --c-ink: #1a1817;
  --c-ink-2: #2a2725;
  --c-ink-3: #4a4541;
  --c-ink-4: #7a7570;
  --c-ink-5: #aba59f;
  --c-line: #e8e4dc;
  --c-line-2: #f2efe8;
  --c-bg: #faf8f3;
  --c-surface: #ffffff;
  --c-paper: #f5f2ea;

  /* Pastel chips — plus chauds */
  --c-accent: #e8f3ea;
  --c-accent-dark: #2d5f3f;
  --c-accent-deep: #1f4530;
  --c-warn: #fcecd3;
  --c-warn-dark: #8a4818;
  --c-alert: #f9dcd6;
  --c-alert-dark: #8c2818;
  --c-good: #d8edd9;
  --c-good-dark: #2d5f3f;

  --c-alert-text: #b54a2e;
  --c-alert-bg: #fbe8e2;
  --c-good-text: #2d6346;
  --c-good-bg: #ebf4ec;
  --c-warn-text: #a8651f;
  --c-warn-bg: #fdf2dc;

  /* Accent terracotta pour les actions importantes */
  --c-action: #c2614a;
  --c-action-soft: #f3d5cb;

  --f-display: 'Fraunces', 'Times New Roman', serif;
  --f-body: 'Inter', system-ui, sans-serif;
  --f-mono: 'JetBrains Mono', ui-monospace, monospace;

  --r-xs: 4px;
  --r-sm: 8px;
  --r: 12px;
  --r-lg: 18px;
  --r-pill: 999px;

  --shadow-sm: 0 1px 2px rgba(40,30,20,.04);
  --shadow: 0 4px 24px -8px rgba(40,30,20,.08);
  --shadow-lg: 0 24px 60px -20px rgba(40,30,20,.12);

  --nav-h: 56px;
  --safe-top: env(safe-area-inset-top);
  --safe-bot: env(safe-area-inset-bottom);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  height: 100%;
  background: var(--c-bg);
  color: var(--c-ink);
  font-family: var(--f-body);
  font-size: 14px;
  line-height: 1.5;
  font-feature-settings: 'ss01', 'cv11';
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
  overscroll-behavior-y: none;
}

input, button, select, textarea { font: inherit; color: inherit; }
button { background: none; border: none; cursor: pointer; }
a { color: inherit; text-decoration: none; }

/* Typography */
.serif { font-family: var(--f-display); letter-spacing: -0.01em; }
.mono { font-family: var(--f-mono); font-feature-settings: 'tnum'; }
.tabular { font-variant-numeric: tabular-nums; }
.uppercase-eyebrow {
  font-size: 10.5px;
  font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--c-ink-4);
}
.h-display { font-family: var(--f-display); font-size: 56px; line-height: 1; font-weight: 400; letter-spacing: -0.025em; }
.h-1 { font-family: var(--f-display); font-size: 38px; font-weight: 400; letter-spacing: -0.025em; line-height: 1.05; }
.h-2 { font-family: var(--f-display); font-size: 22px; font-weight: 500; letter-spacing: -0.015em; }
.h-3 { font-size: 13.5px; font-weight: 600; letter-spacing: -0.005em; }
.text-mute { color: var(--c-ink-4); }
.text-dim { color: var(--c-ink-5); }
.serif { font-family: var(--f-display); font-weight: 400; letter-spacing: -0.015em; }

/* ─────────────── LAYOUT ─────────────── */
#app { min-height: 100dvh; display: flex; flex-direction: column; }

/* ─────────────── LOGIN ─────────────── */
.login-screen {
  min-height: 100dvh;
  display: grid;
  place-items: center;
  background: var(--c-paper);
  position: relative;
  padding: 24px;
  padding-top: calc(24px + var(--safe-top));
}
.login-screen::before {
  content: '';
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 700px 500px at 25% 25%, rgba(34,197,94,.06), transparent 60%),
    radial-gradient(ellipse 900px 700px at 75% 75%, rgba(0,0,0,.025), transparent 60%);
  pointer-events: none;
}
.login-card {
  position: relative;
  width: 100%;
  max-width: 420px;
  padding: 40px 36px 32px;
  background: var(--c-surface);
  border: 1px solid var(--c-line);
  border-radius: var(--r-lg);
  box-shadow: 0 30px 80px -30px rgba(0,0,0,.18);
  animation: fadeUp .5s cubic-bezier(.2,.7,.2,1);
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}
.login-mark {
  width: 48px; height: 48px;
  background: var(--c-ink);
  color: #fff;
  display: grid; place-items: center;
  border-radius: 12px;
  font-family: var(--f-display);
  font-size: 24px;
  font-weight: 500;
  margin-bottom: 24px;
}
.login-h {
  font-family: var(--f-display);
  font-size: 44px;
  letter-spacing: -0.025em;
  line-height: 1;
  font-weight: 400;
  margin-bottom: 6px;
}
.login-h em { color: var(--c-ink-4); font-style: italic; }
.login-sub {
  font-size: 14px;
  color: var(--c-ink-4);
  margin-bottom: 32px;
}

.tab-switch {
  display: grid; grid-template-columns: 1fr 1fr;
  background: var(--c-paper);
  padding: 3px;
  border-radius: var(--r-sm);
  margin-bottom: 20px;
  gap: 2px;
}
.tab-switch button {
  padding: 9px 12px;
  font-size: 13px;
  font-weight: 500;
  color: var(--c-ink-4);
  background: transparent;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-family: inherit;
  transition: color .15s, background .15s, box-shadow .15s;
}
.tab-switch button:hover { color: var(--c-ink-3); }
.tab-switch button.active {
  color: var(--c-ink);
  background: var(--c-surface);
  box-shadow: var(--shadow-sm);
  font-weight: 600;
}

.field { margin-bottom: 14px; }
.field-label {
  display: block;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  color: var(--c-ink-4);
  margin-bottom: 6px;
}
.input {
  width: 100%;
  padding: 11px 14px;
  background: var(--c-surface);
  border: 1px solid var(--c-line);
  border-radius: 10px;
  font-size: 14px;
  font-family: inherit;
  color: inherit;
  transition: border .15s, box-shadow .15s, background .15s;
}
.input:hover { border-color: var(--c-ink-5); }
.input:focus {
  outline: none;
  border-color: var(--c-ink);
  box-shadow: 0 0 0 3px rgba(0,0,0,.06);
}
.input::placeholder { color: var(--c-ink-5); }
.input.mono { font-family: var(--f-mono); letter-spacing: 0.04em; }

.btn-pri {
  width: 100%;
  padding: 12px 22px;
  background: var(--c-ink);
  color: #fff;
  border-radius: var(--r-pill);
  font-size: 13.5px;
  font-weight: 500;
  letter-spacing: -0.005em;
  border: none;
  cursor: pointer;
  font-family: inherit;
  transition: transform .12s, opacity .15s, background .15s;
}
.btn-pri:hover { transform: translateY(-1px); background: var(--c-ink-2); }
.btn-pri:active { transform: translateY(0); }
.btn-pri:disabled { opacity: .4; cursor: not-allowed; transform: none; }

.btn-sec {
  padding: 9px 18px;
  background: var(--c-surface);
  color: var(--c-ink);
  border: 1px solid var(--c-line);
  border-radius: var(--r-pill);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  font-family: inherit;
  transition: background .15s, border-color .15s;
}
.btn-sec:hover { background: var(--c-paper); border-color: var(--c-ink-4); }

.btn-ghost {
  padding: 7px 12px;
  font-size: 12.5px;
  color: var(--c-ink-4);
  border-radius: var(--r-sm);
  background: none;
  border: none;
  font-weight: 500;
  cursor: pointer;
  font-family: inherit;
  transition: background .15s, color .15s;
}
.btn-ghost:hover { background: var(--c-paper); color: var(--c-ink); }

.btn-danger {
  padding: 9px 18px;
  background: var(--c-surface);
  color: var(--c-alert-text);
  border: 1px solid var(--c-line);
  border-radius: var(--r-pill);
  font-size: 13px;
  font-weight: 500;
}
.btn-danger:hover { background: var(--c-alert-bg); border-color: var(--c-alert-text); }

.btn-icon {
  width: 32px; height: 32px;
  display: grid; place-items: center;
  border-radius: var(--r-sm);
  color: var(--c-ink-4);
}
.btn-icon:hover { background: var(--c-paper); color: var(--c-ink); }

.login-status {
  display: flex; align-items: center; gap: 6px;
  margin-top: 20px; padding-top: 16px;
  border-top: 1px solid var(--c-line);
  font-size: 11.5px;
  color: var(--c-ink-4);
}
.dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--c-ink-5);
}
.dot.on { background: #16a34a; box-shadow: 0 0 0 3px rgba(22,163,74,.15); }
.dot.off { background: var(--c-ink-5); }

/* ─────────────── APP SHELL — Top-nav (Combo style) ─────────────── */
.shell { min-height: 100dvh; display: flex; flex-direction: column; }

.topnav {
  background: var(--c-ink);
  color: #fff;
  position: sticky;
  top: 0;
  z-index: 50;
  padding-top: var(--safe-top);
}
.topnav-inner {
  display: flex;
  align-items: center;
  height: var(--nav-h);
  padding: 0 28px;
  gap: 28px;
}
@media (max-width: 900px) { .topnav-inner { padding: 0 16px; gap: 16px; height: 52px; } }
.topnav-brand {
  display: flex; align-items: center; gap: 10px;
  flex-shrink: 0;
}
.brand-mark {
  width: 30px; height: 30px;
  background: #fff;
  color: var(--c-ink);
  display: grid; place-items: center;
  border-radius: 7px;
  font-family: var(--f-display);
  font-size: 17px;
  font-weight: 500;
}
.brand-name {
  font-family: var(--f-display);
  font-size: 18px;
  letter-spacing: -0.01em;
  font-weight: 500;
}
.topnav-links {
  display: flex;
  gap: 0;
  flex: 1;
}
@media (max-width: 900px) { .topnav-links { display: none; } }
.topnav-link {
  background: none;
  border: none;
  color: rgba(255,255,255,.7);
  padding: 0 18px;
  height: 38px;
  margin: 0 2px;
  border-radius: var(--r-pill);
  font-size: 13.5px;
  font-weight: 500;
  font-family: inherit;
  cursor: pointer;
  position: relative;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  transition: color .15s, background .15s;
}
.topnav-link:hover { color: #fff; background: rgba(255,255,255,.06); }
.topnav-link.active {
  color: var(--c-ink);
  background: #fff;
  font-weight: 600;
}

.topnav-right {
  display: flex; align-items: center; gap: 8px;
  margin-left: auto;
  flex-shrink: 0;
}
.topnav-icon {
  width: 36px; height: 36px;
  background: rgba(255,255,255,.06);
  border: none;
  color: rgba(255,255,255,.7);
  border-radius: 50%;
  display: grid; place-items: center;
  cursor: pointer;
  transition: background .15s, color .15s;
  position: relative;
}
.topnav-icon:hover { background: rgba(255,255,255,.12); color: #fff; }
.topnav-avatar {
  width: 36px; height: 36px;
  background: #fff;
  color: var(--c-ink);
  border: none;
  border-radius: 50%;
  display: grid; place-items: center;
  font-size: 13px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: transform .12s, box-shadow .15s;
}
.topnav-avatar:hover { transform: scale(1.06); box-shadow: 0 4px 12px -2px rgba(0,0,0,.25); }
.topnav-avatar:active { transform: scale(.95); }
.status-dot-tiny { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
.dot-badge {
  position: absolute;
  top: 2px; right: 2px;
  background: #ef4444;
  color: #fff;
  font-size: 9.5px;
  font-weight: 600;
  min-width: 16px; height: 16px;
  border-radius: 999px;
  display: grid; place-items: center;
  padding: 0 4px;
  font-family: var(--f-mono);
  border: 2px solid var(--c-ink);
}
.topnav-link .dot-badge {
  position: static;
  border: none;
  background: var(--c-alert-text);
  margin-left: 4px;
}

.topnav-mobile {
  display: none;
  padding: 0 16px 10px;
  border-top: 1px solid rgba(255,255,255,.08);
  margin-top: 0;
}
@media (max-width: 900px) {
  .topnav-mobile { display: block; padding-top: 10px; }
  .topnav-mobile select {
    width: 100%;
    padding: 9px 12px;
    background: rgba(255,255,255,.08);
    border: 1px solid rgba(255,255,255,.15);
    border-radius: var(--r-sm);
    color: #fff;
    font-family: inherit;
    font-size: 13px;
  }
  .topnav-mobile option, .topnav-mobile optgroup { background: var(--c-ink); color: #fff; }
}

.shell-body {
  display: flex;
  flex: 1;
  min-width: 0;
}

/* ─── Sub-nav (RH only) ─── */
.subnav {
  width: 220px;
  flex-shrink: 0;
  background: var(--c-paper);
  border-right: 1px solid var(--c-line);
  padding: 22px 12px;
}
@media (max-width: 900px) { .subnav { display: none; } }
.subnav-section {
  font-size: 10.5px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--c-ink-4);
  font-weight: 600;
  padding: 0 10px;
  margin-bottom: 8px;
}
.subnav-item {
  display: flex;
  align-items: center;
  width: 100%;
  background: none;
  border: none;
  padding: 9px 12px;
  font-family: inherit;
  font-size: 13.5px;
  font-weight: 500;
  color: var(--c-ink-3);
  text-align: left;
  cursor: pointer;
  border-radius: 8px;
  margin-bottom: 2px;
  transition: background .12s, color .12s;
}
.subnav-item:hover { background: var(--c-surface); color: var(--c-ink); }
.subnav-item.active {
  background: var(--c-accent);
  color: var(--c-accent-deep);
  font-weight: 600;
}
.subnav-badge {
  margin-left: auto;
  background: var(--c-ink);
  color: #fff;
  font-size: 10.5px;
  padding: 1px 7px;
  border-radius: 999px;
  font-family: var(--f-mono);
  font-weight: 500;
}
.subnav-badge.alert { background: var(--c-alert-text); }
.subnav-item.active .subnav-badge { background: var(--c-accent-deep); }

/* Main */
.main {
  background: var(--c-bg);
  display: flex; flex-direction: column;
  min-width: 0;
  flex: 1;
}
.page-pad {
  padding: 32px 40px;
  max-width: 1320px;
  width: 100%;
}
.main.has-subnav .page-pad { padding-left: 32px; }
@media (max-width: 700px) { .page-pad { padding: 16px; } }

.page-head {
  display: flex; justify-content: space-between; align-items: flex-end;
  margin-bottom: 28px;
  gap: 16px; flex-wrap: wrap;
}
.page-head .eyebrow { margin-bottom: 6px; }
.page-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

/* ─────────────── PANELS / SECTIONS ─────────────── */
.panel {
  background: var(--c-surface);
  border: 1px solid var(--c-line);
  border-radius: var(--r-lg);
  overflow: hidden;
}
.panel + .panel { margin-top: 16px; }
.panel-head {
  padding: 18px 22px;
  border-bottom: 1px solid var(--c-line);
  display: flex; align-items: center; justify-content: space-between;
  gap: 12px;
}
.panel-head h3 {
  font-family: var(--f-display);
  font-size: 18px;
  font-weight: 500;
  letter-spacing: -0.015em;
}
.panel-body { padding: 22px; }
.panel-body.nopad { padding: 0; }

/* KPI */
.kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 24px; }
@media (max-width: 900px) { .kpi-grid { grid-template-columns: repeat(2, 1fr); } }

.kpi {
  background: var(--c-surface);
  border: 1px solid var(--c-line);
  border-radius: var(--r-lg);
  padding: 20px 22px;
  transition: border-color .15s, transform .15s;
}
.kpi:hover { border-color: var(--c-ink-5); }
.kpi-label { font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--c-ink-4); margin-bottom: 10px; }
.kpi-value {
  font-family: var(--f-display);
  font-size: 40px;
  line-height: 1;
  letter-spacing: -0.02em;
  font-weight: 400;
  margin-bottom: 6px;
  font-variant-numeric: tabular-nums;
}
.kpi-meta { font-size: 11.5px; color: var(--c-ink-4); display: flex; align-items: center; gap: 6px; }
.kpi.alert .kpi-value { color: var(--c-alert-text); }
.kpi.warn .kpi-value { color: var(--c-warn-text); }

.tbl .row-total {
  background: var(--c-paper);
  border-top: 2px solid var(--c-line);
}
.tbl .row-total td {
  padding: 18px 20px;
  font-weight: 600;
  font-size: 13.5px;
  color: var(--c-ink);
}
.tbl .row-total td:first-child {
  letter-spacing: 0;
}

.tbl-sticky thead th {
  position: sticky;
  top: var(--nav-h);
  z-index: 5;
  background: var(--c-bg);
  border-bottom: 1px solid var(--c-line);
}

/* ─── Rappels / Échéances ─── */
.rappel-row {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  padding: 18px 22px;
  border-bottom: 1px solid var(--c-line-2);
  border-left: 3px solid transparent;
  transition: background .15s;
}
.rappel-row:last-child { border-bottom: none; }
.rappel-row:hover { background: var(--c-paper); }
.rappel-row.sev-alert { border-left-color: var(--c-alert-dark); background: linear-gradient(90deg, rgba(249,220,214,0.35) 0%, transparent 60%); }
.rappel-row.sev-warn  { border-left-color: var(--c-warn-dark); background: linear-gradient(90deg, rgba(252,236,211,0.35) 0%, transparent 60%); }
.rappel-row.sev-info  { border-left-color: var(--c-ink-5); }
.rappel-icon {
  font-size: 22px;
  line-height: 1;
  flex-shrink: 0;
  padding-top: 1px;
}
.rappel-body { flex: 1; min-width: 0; }
.rappel-head {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 6px;
}
.rappel-emp {
  font-family: var(--f-display);
  font-size: 17px;
  font-weight: 500;
  letter-spacing: -0.01em;
  color: var(--c-ink);
}
.rappel-detail { font-size: 12.5px; color: var(--c-ink-3); margin-bottom: 4px; line-height: 1.45; }
.rappel-action { font-size: 12px; color: var(--c-ink-4); font-style: italic; }

/* ─── Émargement (côté salarié) ─── */
.emargement-card {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 16px 18px;
  border-radius: var(--r-lg);
  margin-top: 14px;
  border: 1px solid var(--c-line);
}
.emargement-card.unsigned {
  background: linear-gradient(135deg, #fef9f1 0%, #f8f4ea 100%);
  border-color: #e8dec5;
}
.emargement-card.unsigned-effectif {
  background: linear-gradient(135deg, #f0f8ee 0%, #e8f3ea 100%);
  border-color: #c8dccc;
}
.emargement-card.signed {
  background: var(--c-accent);
  border-color: var(--c-accent-dark);
  color: var(--c-accent-deep);
}
.emargement-card.invalidated {
  background: linear-gradient(135deg, #fdf2dc 0%, #fcecd3 100%);
  border-color: var(--c-warn-dark);
  border-width: 2px;
}
.emargement-card.future {
  background: var(--c-paper);
  border-color: var(--c-line);
  border-style: dashed;
  color: var(--c-ink-4);
  opacity: 0.85;
}

/* ─── PAIE CARDS — version compacte ─── */
.pcards { display: flex; flex-direction: column; gap: 10px; }

.pcard {
  background: var(--c-surface);
  border: 1px solid var(--c-line);
  border-radius: var(--r);
  padding: 16px 18px;
  transition: border-color .15s, box-shadow .15s;
}
.pcard:hover { border-color: var(--c-ink-5); box-shadow: 0 4px 16px -8px rgba(40,30,20,.1); }

.pcard-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
  margin-bottom: 14px;
}
.pcard-id { display: flex; align-items: center; gap: 11px; }
.pcard-id .av-emp.sm { width: 32px; height: 32px; font-size: 11px; }
.pcard-name {
  font-family: var(--f-display);
  font-size: 17px;
  font-weight: 500;
  letter-spacing: -0.015em;
  line-height: 1.15;
  display: flex; align-items: center; gap: 7px; flex-wrap: wrap;
}
.pcard-modif {
  font-family: var(--f-body);
  font-size: 9.5px;
  font-weight: 600;
  letter-spacing: 0.01em;
  padding: 2px 7px;
  border-radius: var(--r-pill);
  background: var(--c-ink);
  color: #fff;
}
.pcard-meta { font-size: 11.5px; color: var(--c-ink-4); margin-top: 2px; }
.pcard-top .btn-ghost { font-size: 11.5px; padding: 5px 9px; flex-shrink: 0; }

/* Stats strip */
.pcard-stats {
  display: flex;
  align-items: center;
  gap: 22px;
  padding: 12px 14px;
  background: var(--c-paper);
  border-radius: 10px;
  flex-wrap: wrap;
}
.pstat { display: flex; flex-direction: column; gap: 3px; }
.pstat-k {
  font-size: 9.5px;
  font-weight: 600;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  color: var(--c-ink-4);
}
.pstat-v {
  font-family: var(--f-display);
  font-size: 19px;
  font-weight: 400;
  letter-spacing: -0.02em;
  line-height: 1;
  color: var(--c-ink);
}
.pstat-v i {
  font-family: var(--f-body);
  font-style: normal;
  font-size: 10.5px;
  font-weight: 500;
  opacity: 0.55;
  margin-left: 2px;
}
.pstat-v.c-warn { color: var(--c-warn-dark); }
.pstat-v.c-alert { color: var(--c-alert-dark); }
.pstat-div { width: 1px; align-self: stretch; background: var(--c-line); }
.pstat-hl .pstat-v { font-size: 22px; }
.pstat-money .pstat-v { font-size: 22px; color: var(--c-accent-dark); }
.pstat-money .pstat-k { color: var(--c-accent-dark); }

/* Pills row */
.pcard-pills {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 12px;
}
.ppill {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 5px 10px;
  border-radius: var(--r-pill);
  font-size: 11px;
  color: var(--c-ink-4);
  background: var(--c-paper);
}
.ppill b {
  font-family: var(--f-mono);
  font-weight: 500;
  font-size: 11px;
  color: var(--c-ink);
}
.ppill.warn { background: var(--c-warn); color: var(--c-warn-dark); }
.ppill.warn b { color: var(--c-warn-dark); }
.ppill.alert { background: var(--c-alert); color: var(--c-alert-dark); }
.ppill.alert b { color: var(--c-alert-dark); }
.ppill.accent { background: var(--c-accent); color: var(--c-accent-deep); }
.ppill.accent b { color: var(--c-accent-deep); }
.ppill-in {
  background: var(--c-surface);
  border: 1px solid var(--c-line);
  padding: 3px 8px 3px 10px;
}
.ppill-in input {
  width: 54px;
  border: none;
  background: transparent;
  font-family: var(--f-mono);
  font-size: 11px;
  font-weight: 500;
  text-align: right;
  color: var(--c-ink);
  padding: 2px;
}
.ppill-in input:focus { outline: 1px solid var(--c-ink-5); border-radius: 3px; }
.ppill-in i { font-style: normal; font-size: 10px; color: var(--c-ink-4); }

/* 8 weeks compact row */
.pcard-weeks { margin-top: 12px; }
.pcard-weeks-lbl {
  font-size: 9.5px;
  font-weight: 600;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  color: var(--c-ink-5);
  display: block;
  margin-bottom: 6px;
}
.pweeks-row { display: flex; gap: 5px; }
.pweek {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  padding: 6px 2px;
  border-radius: 7px;
  background: var(--c-paper);
  font-family: var(--f-mono);
  font-size: 12px;
  font-weight: 600;
  color: var(--c-ink-3);
}
.pweek em {
  font-style: normal;
  font-size: 8px;
  font-weight: 400;
  color: var(--c-ink-5);
}
.pweek.ok    { background: var(--c-good); color: var(--c-good-dark); }
.pweek.over  { background: var(--c-warn); color: var(--c-warn-dark); }
.pweek.under { background: var(--c-alert); color: var(--c-alert-dark); }
.pweek.empty { color: var(--c-ink-5); }
.pweek.ok em, .pweek.over em, .pweek.under em { opacity: 0.7; color: inherit; }

/* Total card */
.pcard-total {
  background: linear-gradient(135deg, #faf8f3 0%, #f3f0e8 100%);
  border-style: dashed;
}
.pcard-total .pcard-name { font-style: italic; color: var(--c-ink-3); font-size: 16px; }

@media (max-width: 700px) {
  .pcard-stats { gap: 14px; }
  .pweeks-row { flex-wrap: wrap; }
  .pweek { min-width: 56px; flex: 0 1 auto; }
}

/* Modalités de paie editor */
.modalite-row {
  display: flex;
  gap: 12px;
  padding: 14px;
  border: 1px solid var(--c-line);
  border-radius: var(--r);
  margin-bottom: 10px;
  cursor: pointer;
  transition: border-color .15s, background .15s;
}
.modalite-row:hover { border-color: var(--c-ink-5); background: var(--c-paper); }
.modalite-row input { margin-top: 2px; width: 16px; height: 16px; flex-shrink: 0; }
.modalite-label { font-weight: 600; font-size: 13.5px; margin-bottom: 3px; }
.modalite-detail { font-size: 12px; color: var(--c-ink-4); line-height: 1.45; }

/* Tables */
.tbl { width: 100%; border-collapse: collapse; }
.tbl th {
  text-align: left;
  font-size: 11.5px;
  font-weight: 600;
  letter-spacing: 0;
  text-transform: none;
  color: var(--c-ink-4);
  padding: 14px 22px;
  border-bottom: 1px solid var(--c-line);
  background: transparent;
  white-space: nowrap;
}
.tbl td {
  padding: 20px 22px;
  border-bottom: 1px solid var(--c-line-2);
  font-size: 13.5px;
  vertical-align: middle;
  transition: background .15s ease;
}
.tbl tr:last-child td { border-bottom: none; }
.tbl tr:hover td { background: var(--c-paper); }
.tbl .row-clickable { cursor: pointer; }
.tbl td .stack { display: flex; flex-direction: column; gap: 3px; }
.tbl td .stack .sub {
  font-size: 12px;
  color: var(--c-ink-5);
  text-decoration: none;
  cursor: pointer;
}
.tbl td .stack .sub:hover { color: var(--c-ink-4); }
.tbl td .with-av {
  display: inline-flex;
  align-items: center;
  gap: 14px;
}

/* Avatar */
.av-emp {
  width: 38px; height: 38px;
  display: inline-grid; place-items: center;
  background: var(--c-paper);
  color: var(--c-ink-3);
  border-radius: 50%;
  font-size: 12.5px; font-weight: 600;
  letter-spacing: 0.02em;
  font-family: var(--f-body);
  vertical-align: middle;
  flex-shrink: 0;
  transition: transform .2s cubic-bezier(.2,.7,.2,1);
}
.tbl tr:hover .av-emp { transform: scale(1.06); }
.av-emp.lg { width: 60px; height: 60px; font-size: 19px; }
.av-emp.sm { width: 28px; height: 28px; font-size: 11px; }
.av-emp.dark {
  background: var(--c-ink);
  color: #fff;
}

.emp-cell { display: flex; align-items: center; gap: 12px; }
.emp-cell-name { font-weight: 600; font-size: 13.5px; }
.emp-cell-meta { font-size: 12px; color: var(--c-ink-4); }

/* Status */
.status-dot {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 12px;
  color: var(--c-ink-3);
}
.status-dot::before {
  content: '';
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--c-ink-5);
}
.status-dot.on::before { background: #16a34a; }
.status-dot.off::before { background: var(--c-ink-5); }
.status-dot.alert::before { background: var(--c-alert-text); }
.status-dot.warn::before { background: #d97706; }

.chip {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 11px;
  border-radius: 100px;
  font-size: 11.5px;
  font-weight: 500;
  background: var(--c-paper);
  color: var(--c-ink-3);
  border: none;
  white-space: nowrap;
}
.chip.alert { background: var(--c-alert-text); color: var(--c-alert-dark); }
.chip.good  { background: var(--c-good);  color: var(--c-good-dark); }
.chip.warn  { background: var(--c-warn);  color: var(--c-warn-dark); }
.chip.draft {
  background: #fff7ed;
  color: #9a3412;
  font-weight: 600;
  letter-spacing: 0.02em;
  animation: draftPulse 2s ease-in-out infinite;
}
@keyframes draftPulse {
  0%, 100% { background: #fff7ed; }
  50%      { background: #ffedd5; }
}
.chip.accent {
  background: var(--c-accent);
  color: var(--c-accent-deep);
}

/* Planning grid */
.plan-wrap { overflow-x: auto; }
.plan {
  min-width: 920px;
  display: grid;
  grid-template-columns: 180px repeat(7, 1fr);
  background: var(--c-surface);
}
.plan-cell {
  border-right: 1px solid var(--c-line-2);
  border-bottom: 1px solid var(--c-line-2);
  padding: 8px;
  min-height: 88px;
  position: relative;
  transition: background .15s;
}
.plan-cell:last-child { border-right: none; }
.plan-cell.head { background: var(--c-paper); border-bottom: 1px solid var(--c-line); padding: 10px 12px; min-height: 0; }
.plan-cell.head .day { font-size: 10.5px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--c-ink-4); }
.plan-cell.head .date {
  font-family: var(--f-display);
  font-size: 22px;
  line-height: 1;
  letter-spacing: -0.02em;
  margin-top: 2px;
}
.plan-cell.head .date.today { color: var(--c-alert-text);  }
.plan-cell.emp { background: var(--c-paper); padding: 14px 12px; border-bottom: 1px solid var(--c-line-2); }
.plan-cell.emp .emp-row { display: flex; align-items: flex-start; gap: 10px; }
.plan-cell.emp .emp-nm-wrap { flex: 1; min-width: 0; }
.plan-cell.emp .nm { font-size: 13.5px; font-weight: 600; line-height: 1.2; margin-bottom: 6px; letter-spacing: -0.005em; }
.plan-cell.emp .emp-stats { display: flex; gap: 4px; flex-wrap: wrap; }
.chip-tiny {
  display: inline-flex;
  align-items: center;
  padding: 2px 8px;
  border-radius: 999px;
  font-size: 10.5px;
  font-weight: 500;
  background: var(--c-surface);
  color: var(--c-ink-3);
  font-family: var(--f-mono);
  letter-spacing: 0;
}
.chip-tiny.gap-ok { background: var(--c-good); color: var(--c-good-dark); }
.chip-tiny.gap-over { background: var(--c-warn); color: var(--c-warn-dark); }
.chip-tiny.gap-under { background: var(--c-alert); color: var(--c-alert-dark); }

.plan-cell.cell:hover { background: var(--c-paper); cursor: pointer; }
.plan-cell.cell.has::after {
  content: '';
  position: absolute; inset: 4px;
  border-radius: var(--r-xs);
  pointer-events: none;
}

.shift {
  display: block;
  padding: 9px 11px;
  margin-bottom: 5px;
  border-radius: 10px;
  font-size: 11.5px;
  cursor: pointer;
  position: relative;
  z-index: 1;
  border: none;
  transition: transform .12s cubic-bezier(.2,.7,.2,1), box-shadow .12s, filter .15s;
}
.shift:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 12px -4px rgba(0,0,0,.15);
  filter: saturate(1.1);
}
.shift-title {
  font-weight: 600;
  font-size: 12.5px;
  line-height: 1.2;
  letter-spacing: -0.005em;
  margin-bottom: 3px;
}
.shift-time {
  font-size: 11px;
  opacity: 0.78;
  line-height: 1.3;
  letter-spacing: -0.005em;
}
.shift-dur {
  font-family: var(--f-mono);
  font-size: 10px;
  opacity: 0.6;
  margin-top: 3px;
  letter-spacing: 0.01em;
}

/* Shift type colors — softer, more saturated */
.shift.midi { background: #dbeafe; color: #1e3a8a; }
.shift.soir { background: #dcfce7; color: #14532d; }
.shift.ar   { background: #fef9c3; color: #713f12; }

/* Leave types — single-line absences (centered, no time/dur) */
.shift.absent,
.shift.conge,
.shift.leave-cp,
.shift.leave-justifie,
.shift.leave-injustifie,
.shift.leave-am,
.shift.leave-rtt,
.shift.leave-recup {
  text-align: center;
  padding: 11px 8px;
  font-weight: 600;
  font-size: 11.5px;
  letter-spacing: -0.005em;
}
.shift.absent           { background: #fee2e2; color: #b91c1c; }
.shift.conge            { background: #d1fae5; color: #166534; }
.shift.leave-cp         { background: #dbeafe; color: #1e3a8a; }
.shift.leave-justifie   { background: #fef3c7; color: #92400e; }
.shift.leave-injustifie { background: #fee2e2; color: #991b1b; }
.shift.leave-am         { background: #ede9fe; color: #5b21b6; }
.shift.leave-rtt        { background: #cffafe; color: #155e75; }
.shift.leave-recup      { background: #f3e8ff; color: #6b21a8; }

/* Hours table coloring */
.tbl td.over  { color: var(--c-warn-text); }
.tbl td.under { color: var(--c-alert-text); }

/* Month view */
.month-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 1px;
  background: var(--c-line);
}
.mc {
  background: var(--c-surface);
  min-height: 88px;
  padding: 6px 8px;
  font-size: 11.5px;
  cursor: pointer;
  transition: background .15s;
  position: relative;
}
.mc:hover { background: var(--c-paper); }
.mc.head { background: var(--c-paper); min-height: 0; padding: 8px; cursor: default; }
.mc.head .day {
  font-size: 10.5px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--c-ink-4);
  text-align: center;
}
.mc.out { background: #fafafa; opacity: 0.55; }
.mc.today { background: #fffbeb; }
.mc-date {
  font-family: var(--f-display);
  font-size: 16px;
  letter-spacing: -0.02em;
  line-height: 1;
  margin-bottom: 6px;
}
.mc-date.today { color: var(--c-alert-text);  }
.mc-stat { font-size: 11px; color: var(--c-ink-3); line-height: 1.4; }
.mc-stat strong { font-family: var(--f-mono); font-weight: 500; }
.mc-leaves { display: flex; gap: 2px; margin-top: 4px; flex-wrap: wrap; }
.mc-leave {
  width: 18px; height: 18px;
  border-radius: 50%;
  display: grid; place-items: center;
  font-size: 9.5px;
  font-weight: 600;
  font-family: var(--f-mono);
}
.mc-leave.leave-cp         { background: #dbeafe; color: #1e3a8a; }
.mc-leave.leave-justifie   { background: #fef3c7; color: #92400e; }
.mc-leave.leave-injustifie { background: #fee2e2; color: #991b1b; }
.mc-leave.leave-am         { background: #ede9fe; color: #5b21b6; }
.mc-leave.leave-rtt        { background: #cffafe; color: #155e75; }
.mc-leave.leave-recup      { background: #f3e8ff; color: #6b21a8; }

.dot-color {
  display: inline-block;
  width: 10px; height: 10px;
  border-radius: 50%;
  margin-right: 4px;
  vertical-align: middle;
}

/* Publication banner (employee) */
.pub-banner {
  background: linear-gradient(135deg, #1e3a8a 0%, #312e81 100%);
  color: #fff;
  padding: 14px 16px;
  border-radius: var(--r);
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 12px;
  animation: pubIn .35s cubic-bezier(.2,.7,.2,1);
  box-shadow: 0 8px 24px -8px rgba(30,58,138,.4);
}
@keyframes pubIn {
  from { opacity: 0; transform: translateY(-8px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Jours fériés */
.ferie-banner {
  background: #fef2f2;
  border: none;
  border-radius: var(--r-lg);
  padding: 14px 18px;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 14px;
  color: #7f1d1d;
}
.ferie-banner .ferie-icon { font-size: 20px; line-height: 1; }
.ferie-banner strong { font-weight: 600; font-size: 13.5px; }
.plan-cell.head.ferie {
  background: #fef2f2;
  border-top: 2px solid #dc2626;
}
.plan-cell.head.vacances {
  background: #f0f8ee;
  border-top: 2px solid #84a17a;
}
.vacances-tag {
  font-size: 9.5px;
  color: #4d6845;
  font-weight: 500;
  margin-top: 3px;
  letter-spacing: -0.01em;
  line-height: 1.1;
}
.plan-cell.cell.vacances-cell {
  background: linear-gradient(180deg, rgba(132,161,122,.04) 0%, transparent 30%);
}
.ferie-tag {
  font-size: 9.5px;
  color: #b91c1c;
  font-weight: 500;
  margin-top: 3px;
  letter-spacing: -0.01em;
  line-height: 1.1;
}
.plan-cell.cell.ferie-cell {
  background: linear-gradient(180deg, rgba(220,38,38,.04) 0%, transparent 30%);
}
.mc.ferie { background: #fef7f7; }
.mc.ferie.out { background: #fef2f2; opacity: 0.45; }
.mc-ferie {
  font-size: 9.5px;
  color: #b91c1c;
  font-weight: 600;
  margin-bottom: 4px;
  letter-spacing: -0.01em;
  line-height: 1.15;
  background: #fee2e2;
  padding: 2px 5px;
  border-radius: 3px;
  display: inline-block;
}
.day-card.ferie { border-left: 3px solid #dc2626; }
/* ─── Doc upload ─── */
.ferie-pill {
  display: inline-block;
  margin-top: 4px;
  font-size: 10.5px;
  color: #b91c1c;
  background: #fee2e2;
  padding: 2px 7px;
  border-radius: 10px;
  font-weight: 500;
  letter-spacing: -0.01em;
}
.file-drop {
  display: block;
  border: 2px dashed var(--c-line);
  border-radius: var(--r);
  padding: 28px 16px;
  text-align: center;
  cursor: pointer;
  transition: border-color .15s, background .15s;
}
.file-drop:hover, .file-drop.drag {
  border-color: var(--c-ink);
  background: #fafafa;
}
.file-drop-content { pointer-events: none; }
.docs-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
  gap: 12px;
}
.doc-cat-panel .panel-head { padding: 12px 14px; }
.doc-cat-panel .panel-head h3 { font-size: 14px; }
.doc-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  border-bottom: 1px solid var(--c-line-2);
  transition: background .12s;
}
.doc-item:hover { background: #fafafa; }
.doc-item:last-child { border-bottom: none; }
.doc-icon { font-size: 22px; flex-shrink: 0; width: 28px; text-align: center; }
.doc-info { flex: 1; min-width: 0; }
.doc-name {
  font-size: 12.5px;
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.doc-meta { font-size: 11px; color: var(--c-ink-4); margin-top: 2px; }
.doc-actions { display: flex; gap: 2px; }
.doc-actions a, .doc-actions button {
  width: 28px; height: 28px;
  display: grid; place-items: center;
  border-radius: 6px;
  font-size: 13px;
  color: var(--c-ink-4);
  text-decoration: none;
  cursor: pointer;
  background: none;
  border: none;
  transition: background .12s, color .12s;
}
.doc-actions a:hover, .doc-actions button:hover {
  background: var(--c-paper);
  color: var(--c-ink);
}

.progress-bar {
  width: 100%;
  height: 6px;
  background: var(--c-line);
  border-radius: 999px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #1e3a8a, #14532d);
  width: 0;
  transition: width .3s ease;
}

/* ─── Info banner ─── */
.info-banner {
  display: flex;
  gap: 14px;
  align-items: center;
  padding: 14px 18px;
  border-radius: var(--r-lg);
  margin-bottom: 16px;
  font-size: 13px;
  animation: fadeIn .25s ease;
}
.info-banner.draft-banner {
  background: #fff7ed;
  color: #9a3412;
  border: none;
}
.btn-link {
  background: none;
  border: none;
  font-size: 18px;
  color: inherit;
  opacity: .5;
  cursor: pointer;
  padding: 0 6px;
  font-family: inherit;
}
.btn-link:hover { opacity: 1; }

/* ─── Compact table for compta view ─── */
.tbl-compact th,
.tbl-compact td {
  padding: 9px 10px;
  font-size: 12px;
}
.tbl-compact th {
  font-size: 10.5px;
  letter-spacing: 0.02em;
  vertical-align: bottom;
  line-height: 1.25;
}
.tbl-compact .av-emp.sm { width: 24px; height: 24px; font-size: 9.5px; }

/* ─── Smooth global transitions ─── */
.btn-pri, .btn-sec, .btn-ghost, .btn-icon, .btn-danger {
  transition: background .15s, color .15s, border-color .15s, transform .08s;
}
.btn-pri:active, .btn-sec:active, .btn-ghost:active, .btn-icon:active {
  transform: scale(.97);
}
.panel { transition: box-shadow .15s; }
.plan-cell.cell:hover .shift { box-shadow: 0 6px 14px -4px rgba(0,0,0,.18); }
.tbl tr { transition: background .12s; }
.tbl tbody tr:hover { background: var(--c-paper); }
.chip { transition: background .12s; }
.emp-tab { user-select: none; }

/* ─── Fiche salarié — header & tabs ─── */
.emp-header {
  background: var(--c-surface);
  border: 1px solid var(--c-line);
  color: var(--c-ink);
  border-radius: var(--r-lg);
  padding: 28px 32px;
  margin-bottom: 18px;
}
.emp-header-top { display: flex; gap: 18px; align-items: center; margin-bottom: 24px; }
.emp-header .av-emp.lg {
  width: 64px; height: 64px;
  font-size: 20px;
  background: var(--c-paper);
  color: var(--c-ink-3);
  font-weight: 600;
}
.emp-header-name {
  font-family: var(--f-display);
  font-size: 36px; line-height: 1.05; letter-spacing: -0.025em; font-weight: 400;
  margin-bottom: 6px;
}
.emp-header-sub { font-size: 13.5px; color: var(--c-ink-4); }
.emp-header-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
  gap: 18px;
  padding-top: 22px;
  border-top: 1px solid var(--c-line);
}
.ehg-label {
  font-size: 10.5px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--c-ink-4);
  margin-bottom: 6px;
  font-weight: 500;
}
.ehg-value { font-size: 15px; font-weight: 600; color: var(--c-ink); }

.emp-tabs {
  display: flex;
  gap: 4px;
  border-bottom: 1px solid var(--c-line);
  margin-bottom: 22px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.emp-tabs::-webkit-scrollbar { display: none; }
.emp-tab {
  background: none;
  border: none;
  padding: 13px 18px;
  font-family: inherit;
  font-size: 13px;
  color: var(--c-ink-4);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  white-space: nowrap;
  font-weight: 500;
  transition: color .15s, border-color .15s;
}
.emp-tab:hover { color: var(--c-ink); }
.emp-tab.active {
  color: var(--c-ink);
  border-bottom-color: var(--c-ink);
}
.emp-tabbody { animation: fadeIn .25s ease; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

/* ─── kv rows (info display) ─── */
.info-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
  gap: 14px;
}
.kv-row {
  display: grid;
  grid-template-columns: 180px 1fr;
  gap: 14px;
  padding: 10px 0;
  border-bottom: 1px solid var(--c-line-2);
  font-size: 13px;
}
.kv-row:last-child { border-bottom: none; }
.kv-label { color: var(--c-ink-4); font-weight: 500; }
.kv-value { color: var(--c-ink); }

/* ─── CP summary cards ─── */
.cp-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 12px;
}
.cp-card {
  background: var(--c-surface);
  border: 1px solid var(--c-line);
  border-radius: var(--r);
  padding: 16px 18px;
}
.cp-card-label {
  font-size: 10.5px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--c-ink-4);
  margin-bottom: 6px;
  font-weight: 500;
}
.cp-card-value {
  font-family: var(--f-display);
  font-size: 28px;
  letter-spacing: -0.02em;
  font-weight: 600;
  line-height: 1;
}
.cp-card-sub {
  margin-top: 6px;
  font-size: 11px;
  color: var(--c-ink-4);
}

/* ─── Modal section titles ─── */
.modal-section-title {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  font-weight: 600;
  color: var(--c-ink-4);
  margin-top: 18px;
  margin-bottom: 10px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--c-line-2);
}
.modal-section-title:first-child { margin-top: 0; }

/* ─── Panel head with right button ─── */
.panel-head { display: flex; align-items: center; justify-content: space-between; }
.panel-head .btn-sec { padding: 6px 12px; font-size: 12px; }

@media (max-width: 700px) {
  .emp-header { padding: 16px 18px; }
  .emp-header-name { font-size: 22px; }
  .av-emp.lg { width: 48px; height: 48px; font-size: 18px; }
  .kv-row { grid-template-columns: 130px 1fr; gap: 10px; font-size: 12.5px; }
  .info-grid { grid-template-columns: 1fr; }
}

.plan-actions {
  gap: 8px;
  margin-bottom: 14px;
  flex-wrap: wrap;
}

/* ─── Impression / Export PDF ─── */
@media print {
  @page { size: A4 landscape; margin: 12mm 10mm; }
  body { background: white !important; color: black !important; }
  body * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .side, .mob-head, .toast-host, .modal-back,
  .page-actions, .plan-actions, .ferie-banner,
  .pub-banner, [data-page], .row[style*="margin-top:12px"] { display: none !important; }
  .main { padding: 0 !important; max-width: 100% !important; margin: 0 !important; }
  .page-head { margin-bottom: 6mm; }
  .page-head .h-1 { font-size: 20px !important; }
  .panel { box-shadow: none !important; border: 1px solid #ddd !important; }
  .panel-body.nopad { padding: 0 !important; }
  .plan-wrap { overflow: visible !important; }
  .plan {
    grid-template-columns: 110px repeat(7, 1fr) !important;
    page-break-inside: avoid;
  }
  .plan-cell {
    font-size: 9px !important;
    padding: 4px 5px !important;
    min-height: 48px !important;
  }
  .plan-cell.head { padding: 5px !important; }
  .plan-cell.head .date { font-size: 14px !important; }
  .plan-cell.head .day { font-size: 8.5px !important; }
  .plan-cell.emp .nm { font-size: 11px !important; }
  .plan-cell.emp .ct { font-size: 9px !important; }
  .ferie-tag { font-size: 7.5px !important; }
  .shift {
    padding: 3px 5px !important;
    font-size: 8.5px !important;
    margin-bottom: 2px !important;
    border-width: 1px !important;
  }
  .shift .l { font-size: 8.5px !important; }
  .shift .t { font-size: 8px !important; }
  .shift .dur, .shift .pause { font-size: 7.5px !important; }
  .av-emp { width: 24px !important; height: 24px !important; font-size: 9px !important; }
}
.printing .side, .printing .mob-head { display: none !important; }
.printing .main { padding: 0 !important; max-width: 100% !important; }

/* ─────────────── EMPLOYEE MOBILE ─────────────── */
.emp-shell {
  display: flex; flex-direction: column;
  min-height: 100dvh;
  background: var(--c-bg);
  padding-top: var(--safe-top);
  padding-bottom: calc(72px + var(--safe-bot));
}
.emp-topbar {
  padding: 14px 16px;
  background: var(--c-surface);
  border-bottom: 1px solid var(--c-line);
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0;
  z-index: 100;
}
.emp-topbar .greet .gtitle { font-family: var(--f-display); font-size: 22px; letter-spacing: -0.02em; line-height: 1; }
.emp-topbar .greet .gsub { font-size: 11.5px; color: var(--c-ink-4); margin-top: 2px; }

.emp-content { padding: 16px; flex: 1; }

.emp-tabbar {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--c-surface);
  border-top: 1px solid var(--c-line);
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  padding: 8px 0 calc(8px + var(--safe-bot));
  z-index: 100;
}
.emp-tab {
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  padding: 6px 4px;
  color: var(--c-ink-5);
  font-size: 10.5px;
  font-weight: 500;
  letter-spacing: 0.02em;
  transition: color .15s;
}
.emp-tab.active { color: var(--c-ink); }
.emp-tab svg { width: 22px; height: 22px; }

/* Big pointage button */
.punch-card {
  background: var(--c-ink);
  color: var(--c-surface);
  border-radius: var(--r-lg);
  padding: 24px 20px;
  margin-bottom: 16px;
  position: relative;
  overflow: hidden;
}
.punch-card::before {
  content: '';
  position: absolute;
  top: -50%; right: -20%;
  width: 200px; height: 200px;
  background: radial-gradient(circle, rgba(255,255,255,.08), transparent 70%);
  pointer-events: none;
}
.punch-time {
  font-family: var(--f-display);
  font-size: 56px;
  line-height: 1;
  letter-spacing: -0.03em;
  font-variant-numeric: tabular-nums;
  margin-bottom: 4px;
}
.punch-date { font-size: 12px; color: rgba(255,255,255,.55); letter-spacing: 0.04em; text-transform: uppercase; margin-bottom: 20px; }
.punch-status { font-size: 13px; color: rgba(255,255,255,.7); margin-bottom: 16px; line-height: 1.5; }
.punch-btn {
  display: block;
  width: 100%;
  padding: 14px;
  background: var(--c-surface);
  color: var(--c-ink);
  border-radius: var(--r-sm);
  font-size: 14px;
  font-weight: 500;
  text-align: center;
  position: relative;
  z-index: 2;
  transition: transform .12s;
}
.punch-btn:hover { transform: translateY(-1px); }
.punch-btn.secondary {
  background: rgba(255,255,255,.1);
  color: var(--c-surface);
  border: 1px solid rgba(255,255,255,.15);
  margin-top: 8px;
}

.day-card {
  background: var(--c-surface);
  border: 1px solid var(--c-line);
  border-radius: var(--r);
  padding: 14px 16px;
  margin-bottom: 10px;
  display: flex; align-items: center; gap: 12px;
}
.day-card .day-num {
  font-family: var(--f-display);
  font-size: 28px;
  line-height: 1;
  letter-spacing: -0.02em;
  min-width: 36px;
  font-variant-numeric: tabular-nums;
}
.day-card .day-name { font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--c-ink-4); }
.day-card.today .day-num { color: var(--c-alert-text);  }
.day-card.today { border-color: var(--c-ink); }
.day-card .day-info { flex: 1; }
.day-card .day-shift {
  font-family: var(--f-mono);
  font-size: 13px;
  font-weight: 500;
  margin-top: 4px;
}
.day-card .day-meta { font-size: 11.5px; color: var(--c-ink-4); margin-top: 2px; }
.day-card.off .day-shift { color: var(--c-ink-5); }

/* ─────────────── MODAL — Slide-in side panel (Combo style) ─────────────── */
.modal-bg {
  position: fixed; inset: 0;
  background: rgba(10,10,10,.45);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  z-index: 1000;
  animation: bgIn .25s ease;
  display: flex;
  justify-content: flex-end;
}
@keyframes bgIn { from { opacity: 0; } to { opacity: 1; } }
.modal {
  background: var(--c-surface);
  width: 100%;
  max-width: 540px;
  height: 100%;
  overflow: auto;
  display: flex;
  flex-direction: column;
  box-shadow: -24px 0 80px -20px rgba(0,0,0,.25);
  animation: slideIn .35s cubic-bezier(.2,.85,.3,1);
  border-radius: 0;
}
@keyframes slideIn {
  from { transform: translateX(56px); opacity: 0; }
  to   { transform: translateX(0);   opacity: 1; }
}
.modal-bg.closing { animation: bgOut .22s ease forwards; }
.modal-bg.closing .modal { animation: slideOut .25s cubic-bezier(.4,0,.2,1) forwards; }
@keyframes bgOut { to { opacity: 0; } }
@keyframes slideOut { to { transform: translateX(40px); opacity: 0; } }

.modal-h {
  padding: 24px 28px 18px;
  border-bottom: 1px solid var(--c-line);
  display: flex; justify-content: space-between; align-items: flex-start;
  gap: 16px;
  position: sticky; top: 0;
  background: var(--c-surface);
  z-index: 2;
}
.modal-h h3 {
  font-family: var(--f-display);
  font-size: 30px;
  letter-spacing: -0.025em;
  font-weight: 400;
  line-height: 1.1;
}
.modal-h .btn-ghost { padding: 4px 8px; font-size: 18px; line-height: 1; color: var(--c-ink-4); }
.modal-b {
  padding: 22px 28px;
  flex: 1;
  overflow-y: auto;
}
.modal-f {
  padding: 16px 28px;
  border-top: 1px solid var(--c-line);
  display: flex; gap: 10px; justify-content: flex-end;
  position: sticky; bottom: 0;
  background: var(--c-surface);
}
.modal-f .btn-pri { width: auto; }

@media (max-width: 700px) {
  .modal-bg { justify-content: stretch; }
  .modal { max-width: 100%; }
  .modal-h { padding: 18px 20px 14px; }
  .modal-h h3 { font-size: 22px; }
  .modal-b { padding: 18px 20px; }
  .modal-f { padding: 14px 20px; }
}

/* Toast */
#toast-host {
  position: fixed;
  top: calc(20px + var(--safe-top));
  right: 20px;
  z-index: 2000;
  display: flex; flex-direction: column; gap: 8px;
  pointer-events: none;
}
@media (max-width: 700px) {
  #toast-host { left: 16px; right: 16px; top: calc(16px + var(--safe-top)); }
}
.toast {
  background: var(--c-ink);
  color: var(--c-surface);
  padding: 14px 18px;
  border-radius: var(--r-pill);
  font-size: 13px;
  box-shadow: var(--shadow-lg);
  animation: toastIn .3s cubic-bezier(.2,.85,.3,1);
  pointer-events: auto;
  display: flex; align-items: center; gap: 10px;
  min-width: 220px;
  font-weight: 500;
}
.toast.error { background: var(--c-alert-dark); }
.toast.good { background: #047857; }
@keyframes toastIn { from { opacity: 0; transform: translateY(-8px) translateX(20px); } to { opacity: 1; transform: translateY(0) translateX(0); } }
@keyframes toastOut { to { opacity: 0; transform: translateX(20px); } }

/* Spinner */
.spin {
  display: inline-block;
  width: 14px; height: 14px;
  border: 2px solid currentColor;
  border-right-color: transparent;
  border-radius: 50%;
  animation: spin .7s linear infinite;
  opacity: .6;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Empty state */
.empty {
  padding: 80px 24px;
  text-align: center;
  color: var(--c-ink-4);
}
.empty h4 { font-family: var(--f-display); font-size: 26px; color: var(--c-ink); margin-bottom: 8px; font-weight: 400; letter-spacing: -0.02em; }
.empty p { font-size: 14px; max-width: 380px; margin: 0 auto; }

/* Mobile admin header */
/* Alert row */
.alert-row {
  display: flex; align-items: flex-start; gap: 14px;
  padding: 18px 22px;
  border-bottom: 1px solid var(--c-line-2);
  transition: background .15s;
}
.alert-row:hover { background: var(--c-paper); }
.alert-row:last-child { border-bottom: none; }
.alert-row .alert-icon {
  width: 32px; height: 32px;
  background: var(--c-alert);
  color: var(--c-alert-dark);
  border-radius: 50%;
  display: grid; place-items: center;
  flex-shrink: 0;
  font-size: 14px;
}
.alert-row.warn .alert-icon { background: var(--c-warn); color: var(--c-warn-dark); }
.alert-row .alert-body { flex: 1; min-width: 0; }
.alert-row .alert-title { font-size: 14px; font-weight: 600; margin-bottom: 3px; letter-spacing: -0.005em; }
.alert-row .alert-meta { font-size: 12.5px; color: var(--c-ink-4); }
.alert-row .alert-actions { display: flex; gap: 6px; }

/* Stripes for week separators */
.week-nav {
  display: flex;
  align-items: center;
  gap: 4px;
  background: var(--c-paper);
  padding: 4px;
  border-radius: var(--r-pill);
}
.week-nav .btn-icon {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: transparent;
  border: none;
  color: var(--c-ink-3);
  cursor: pointer;
  display: grid; place-items: center;
  transition: background .15s, color .15s;
}
.week-nav .btn-icon:hover { background: var(--c-surface); color: var(--c-ink); }
.week-nav .week-label {
  padding: 0 14px;
  font-family: var(--f-mono);
  font-size: 12.5px;
  min-width: 150px;
  text-align: center;
  color: var(--c-ink-3);
  font-weight: 500;
}
.week-nav .btn-sec {
  margin-left: 4px;
  padding: 6px 14px;
  font-size: 12px;
}

/* Forms grid */
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.form-grid .full { grid-column: 1 / -1; }
@media (max-width: 500px) { .form-grid { grid-template-columns: 1fr; } }

/* Skeleton */
.skel { height: 14px; background: linear-gradient(90deg, var(--c-line-2), var(--c-paper), var(--c-line-2)); background-size: 200% 100%; animation: skel 1.4s infinite; border-radius: 4px; }
@keyframes skel { from { background-position: 200% 0; } to { background-position: -200% 0; } }

/* Utility */
.row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.col { display: flex; flex-direction: column; gap: 8px; }
.spacer { flex: 1; }
.divider { height: 1px; background: var(--c-line); margin: 16px 0; }

.hidden { display: none !important; }
.fade-in { animation: fadeUp .4s cubic-bezier(.2,.7,.2,1); }

/* Smooth focus rings */
button:focus-visible, .input:focus-visible, select:focus-visible, textarea:focus-visible {
  outline: 2px solid var(--c-accent-dark);
  outline-offset: 2px;
}

/* Scroll */
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--c-line); border-radius: 8px; border: 2px solid transparent; background-clip: padding-box; }
::-webkit-scrollbar-thumb:hover { background: var(--c-ink-5); border: 2px solid transparent; background-clip: padding-box; }
</style>
